<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Tiket Geomatik v4.0 (Cloud Storage)</title>
    <style>
        :root { --primary: #2980b9; --danger: #e74c3c; --bg: #f5f6fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #34495e; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        
        /* Style untuk Preview Gambar */
        #preview { width: 100%; max-height: 200px; object-fit: contain; margin-top: 10px; display: none; border: 2px dashed #ddd; border-radius: 8px; }

        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-submit { background: var(--primary); color: white; }
        .btn-submit:hover { background: #2471a3; }
        .btn-submit:disabled { background: #bdc3c7; cursor: not-allowed; }

        #statusMsg { text-align: center; margin-top: 15px; font-weight: bold; padding: 10px; border-radius: 5px; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <h2>Laporan Kerosakan Alat</h2>
    <form id="ticketForm">
        <div class="form-group">
            <label>Jenis Peralatan</label>
            <select id="toolType">
                <option value="Total Station">Total Station</option>
                <option value="GNSS Receiver">GNSS Receiver</option>
                <option value="Digital Level">Digital Level</option>
                <option value="Drone">Drone/UAV</option>
                <option value="Aksesori">Aksesori (Tripod/Prism)</option>
            </select>
        </div>

        <div class="form-group">
            <label>No. Siri / No. Aset</label>
            <input type="text" id="serialNo" placeholder="Contoh: TS-01-2024" required>
        </div>

        <div class="form-group">
            <label>Tahap Kerosakan</label>
            <select id="priority">
                <option value="High">Kritikal (Tidak boleh guna)</option>
                <option value="Medium">Sederhana (Ada ralat/rosak kecil)</option>
                <option value="Low">Rutin (Perlu servis/kalibrasi)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Deskripsi Masalah</label>
            <textarea id="desc" rows="3" placeholder="Nyatakan apa yang rosak..." required></textarea>
        </div>

        <div class="form-group">
            <label>Gambar Kerosakan (Pilihan)</label>
            <input type="file" id="fileInput" accept="image/*" onchange="previewImage()">
            <img id="preview" src="" alt="Preview Gambar">
        </div>

        <div class="form-group">
            <label>Nama Pelapor</label>
            <input type="text" id="reporter" placeholder="Nama anda" required>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">Hantar Laporan & Gambar</button>
    </form>

    <div id="statusMsg"></div>
</div>

<script>
    // URL Web App Terbaru (Google Drive Integration)
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxAiA93IsUJ3ehDUE3HmfYasVqZTE3y3bUlPM_vLWK-iTvR80lvIRO_nec0wHsDBRkybg/exec';
    
    const form = document.getElementById('ticketForm');
    const btn = document.getElementById('submitBtn');
    const statusMsg = document.getElementById('statusMsg');
    const preview = document.getElementById('preview');
    let base64String = "";

    // Fungsi untuk memproses gambar (Resize & Base64)
    function previewImage() {
        const file = document.getElementById('fileInput').files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            const img = new Image();
            img.src = e.target.result;
            img.onload = function() {
                // Resize ke 400px supaya stabil untuk upload
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const maxWidth = 400; 
                const scale = maxWidth / img.width;
                canvas.width = maxWidth;
                canvas.height = img.height * scale;

                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                // Gunakan format JPEG kualiti 0.7
                base64String = canvas.toDataURL('image/jpeg', 0.7);
                preview.src = base64String;
                preview.style.display = "block";
            }
        };
        if (file) { reader.readAsDataURL(file); }
    }

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        btn.disabled = true;
        btn.innerHTML = "Menghantar ke Cloud...";
        statusMsg.style.display = "none";

        const formData = {
            alat: document.getElementById('toolType').value,
            serial: document.getElementById('serialNo').value,
            priority: document.getElementById('priority').value,
            masalah: document.getElementById('desc').value,
            pelapor: document.getElementById('reporter').value,
            gambar: base64String 
        };

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            cache: 'no-cache',
            body: JSON.stringify(formData)
        })
        .then(() => {
            statusMsg.className = "success";
            statusMsg.innerHTML = "Berjaya! Data dan Gambar telah disimpan.";
            statusMsg.style.display = "block";
            
            form.reset();
            preview.style.display = "none";
            base64String = "";
            btn.disabled = false;
            btn.innerHTML = "Hantar Laporan & Gambar";
        })
        .catch(error => {
            statusMsg.className = "error";
            statusMsg.innerHTML = "Ralat: " + error.message;
            statusMsg.style.display = "block";
            btn.disabled = false;
            btn.innerHTML = "Cuba Lagi";
        });
    });
</script>

</body>
</html>
