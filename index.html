<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Tiket Geomatik v5.0 (Stabil)</title>
    <style>
        :root { --primary: #2980b9; --bg: #f5f6fa; }

        /* Bahagian Latar Belakang */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 20px;
            /* Tambahan kod background */
            background-image: url('backgroundpuo.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: var(--bg); /* Fallback warna jika gambar gagal loading */
        }

        /* Container dibuat sedikit transparan supaya nampak lebih moden dengan background */
        .container { 
            max-width: 600px; 
            margin: auto; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        }

        h2 { text-align: center; color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #34495e; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        #preview { width: 100%; max-height: 200px; object-fit: contain; margin-top: 10px; display: none; border: 2px dashed #ddd; border-radius: 8px; }
        
        button { 
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 10px; 
            background: var(--primary); 
            color: white; 
        }
        
        button:disabled { background: #bdc3c7; }
        #statusMsg { text-align: center; margin-top: 15px; font-weight: bold; padding: 10px; border-radius: 5px; display: none; }
        .success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>

<div class="container">
    <h2>Laporan Kerosakan Alat</h2>
    <form id="ticketForm">
        <div class="form-group">
            <label>Jenis Peralatan</label>
            <select id="toolType">
                <option value="Total Station">Total Station</option>
                <option value="GNSS Receiver">GNSS Receiver</option>
                <option value="Digital Level">Digital Level</option>
            </select>
        </div>

        <div class="form-group">
            <label>No. Siri / No. Aset</label>
            <input type="text" id="serialNo" required>
        </div>

        <div class="form-group">
            <label>Tahap Kerosakan</label>
            <select id="priority">
                <option value="High">Kritikal</option>
                <option value="Medium">Sederhana</option>
                <option value="Low">Rutin</option>
            </select>
        </div>

        <div class="form-group">
            <label>Deskripsi Masalah</label>
            <textarea id="desc" rows="3" required></textarea>
        </div>

        <div class="form-group">
            <label>Gambar Kerosakan</label>
            <input type="file" id="fileInput" accept="image/*" onchange="previewImage()">
            <img id="preview" src="" alt="Preview">
        </div>

        <div class="form-group">
            <label>Nama Pelapor</label>
            <input type="text" id="reporter" required>
        </div>

        <button type="submit" id="submitBtn">Hantar Laporan & Gambar</button>
    </form>
    <div id="statusMsg"></div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxoace7fkEYJhqhdpRKixVzV_puFqXcyghqcI6QFgYd4HeAMmXUGK31IM8AgOtupX0tgw/exec';
    
    const form = document.getElementById('ticketForm');
    const btn = document.getElementById('submitBtn');
    const statusMsg = document.getElementById('statusMsg');
    let base64String = "";

    function previewImage() {
        const file = document.getElementById('fileInput').files[0];
        const reader = new FileReader();
        const preview = document.getElementById('preview');

        reader.onload = function(e) {
            const img = new Image();
            img.src = e.target.result;
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const maxWidth = 400; 
                const scale = maxWidth / img.width;
                canvas.width = maxWidth;
                canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                base64String = canvas.toDataURL('image/jpeg', 0.7);
                preview.src = base64String;
                preview.style.display = "block";
            }
        };
        if (file) { reader.readAsDataURL(file); }
    }

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerHTML = "Sedang Menghantar...";

        const formData = {
            alat: document.getElementById('toolType').value,
            serial: document.getElementById('serialNo').value,
            priority: document.getElementById('priority').value,
            masalah: document.getElementById('desc').value,
            pelapor: document.getElementById('reporter').value,
            gambar: base64String 
        };

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(formData)
        })
        .then(() => {
            statusMsg.className = "success";
            statusMsg.innerHTML = "Berjaya dihantar! Sila semak Google Sheets.";
            statusMsg.style.display = "block";
            form.reset();
            document.getElementById('preview').style.display = "none";
            base64String = "";
            btn.disabled = false;
            btn.innerHTML = "Hantar Laporan & Gambar";
        })
        .catch(error => {
            alert("Ralat: " + error.message);
            btn.disabled = false;
        });
    });
</script>
</body>
</html>
