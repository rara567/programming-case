<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Aduan Kerosakan Alat Geomatik PUO</title>
    <style>
        :root { 
            --primary: #2980b9; 
            --secondary: #3498db;
            --bg: #f5f6fa; 
            --text: #2c3e50;
            --danger: #e74c3c;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
            margin: 0; 
            padding: 40px 20px;
            background-image: url('backgroundpuo.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: var(--bg);
        }

        /* --- LOG MASUK & DAFTAR OVERLAY --- */
        #loginOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .login-box {
            background: white;
            padding: 35px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .role-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            background: #f9f9f9;
            font-weight: bold;
            transition: 0.3s;
        }

        .role-btn.active {
            border-color: var(--primary);
            background: rgba(41, 128, 185, 0.1);
            color: var(--primary);
        }

        /* --- CONTAINER UTAMA --- */
        .container { 
            max-width: 650px; 
            margin: auto; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
            display: none; 
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            gap: 20px;
            border-bottom: 2px solid rgba(41, 128, 185, 0.1);
            padding-bottom: 20px;
        }

        .header-container img { width: 60px; height: auto; }

        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--text); }

        input, select, textarea { 
            width: 100%; padding: 14px; 
            border: 2px solid #e1e8ed; border-radius: 12px; 
            font-size: 1rem; box-sizing: border-box;
        }

        input:focus { border-color: var(--secondary); outline: none; }

        /* BUTANG */
        button { 
            width: 100%; padding: 16px; border: none; border-radius: 12px; 
            font-size: 1.1rem; font-weight: 700; cursor: pointer; 
            transition: 0.3s; margin-top: 10px;
        }

        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(41,128,185,0.3); }

        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); margin-top: 5px; font-size: 0.9rem; padding: 10px; }

        .btn-logout { 
            background: var(--danger); color: white; margin-top: 30px; 
            font-size: 1rem; opacity: 0.9;
        }

        #preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 12px; margin-top: 10px; display: none; }

        #statusMsg { text-align: center; margin-top: 20px; font-weight: bold; padding: 15px; border-radius: 12px; display: none; }
        .success { background: #d4edda; color: #155724; }

        .link-text { color: var(--primary); cursor: pointer; text-decoration: underline; font-size: 0.9rem; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box" id="loginBox">
        <img src="logo.png" style="width: 70px; margin-bottom: 10px;">
        <h3 id="loginTitle">Log Masuk Sistem</h3>
        
        <div class="role-selector" id="roleSelectArea">
            <button class="role-btn active" onclick="setRole('user')">Pengguna</button>
            <button class="role-btn" onclick="setRole('admin')">Admin</button>
        </div>

        <div class="form-group">
            <input type="text" id="idInput" placeholder="ID Pelajar (e.g: F1010)">
        </div>
        <div class="form-group">
            <input type="password" id="passInput" placeholder="Kata Laluan">
        </div>

        <button class="btn-primary" onclick="checkLogin()">Masuk Sekarang</button>
        
        <p id="signUpPrompt" style="margin-top:15px; font-size:0.9rem;">
            Tiada akaun? <span class="link-text" onclick="toggleAuth('signup')">Daftar Sini</span>
        </p>
        <p id="loginErr" style="color:red; font-size: 0.8rem; margin-top:10px; display:none;">ID atau Kata Laluan Salah!</p>
    </div>

    <div class="login-box" id="signupBox" style="display:none;">
        <h3 style="margin-top:0;">Daftar Akaun Baru</h3>
        <div class="form-group">
            <label>ID Pelajar</label>
            <input type="text" id="regId" placeholder="Contoh: F1010">
        </div>
        <div class="form-group">
            <label>Kata Laluan Baru</label>
            <input type="password" id="regPass" placeholder="Cipta Kata Laluan">
        </div>
        <button class="btn-primary" onclick="handleSignUp()">Simpan Akaun</button>
        <button class="btn-outline" onclick="toggleAuth('login')">Kembali ke Log Masuk</button>
    </div>
</div>

<div class="container" id="mainApp">
    <div class="header-container">
        <img src="logo.png" alt="Logo PUO">
        <h2>E-Aduan Kerosakan Alat Geomatik PUO</h2>
    </div>

    <form id="ticketForm">
        <div class="form-group">
            <label>Jenis Peralatan</label>
            <select id="toolType" required>
                <option value="" disabled selected>Pilih Alatan...</option>
                <optgroup label="Alat Utama">
                    <option value="Total Station">Total Station</option>
                    <option value="GNSS Receiver">GNSS Receiver</option>
                    <option value="Digital Level">Digital Level</option>
                </optgroup>
                <optgroup label="Aksesori & Lain-lain">
                    <option value="Tripod">Tripod</option>
                    <option value="Prism">Prism</option>
                    <option value="Leveling Staff">Leveling Staff</option>
                    <option value="Pita Ukur">Pita Ukur</option>
                    <option value="Tukul">Tukul</option>
                    <option value="Lain-lain">Lain-lain</option>
                </optgroup>
            </select>
        </div>

        <div class="form-group">
            <label>No. Siri / No. Aset</label>
            <input type="text" id="serialNo" placeholder="Contoh: PUO/GEO/TS-01" required>
        </div>

        <div class="form-group">
            <label>Tahap Kerosakan</label>
            <select id="priority">
                <option value="High">Kritikal (Tidak Boleh Diguna)</option>
                <option value="Medium">Sederhana (Masih Berfungsi)</option>
                <option value="Low">Rutin (Kerosakan Kecil)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Deskripsi Masalah</label>
            <textarea id="desc" rows="4" placeholder="Sila jelaskan kerosakan secara terperinci..." required></textarea>
        </div>

        <div class="form-group">
            <label>Gambar Kerosakan</label>
            <input type="file" id="fileInput" accept="image/*" onchange="previewImage()">
            <img id="preview" src="">
        </div>

        <div class="form-group">
            <label>Nama Pelapor (ID Pelajar)</label>
            <input type="text" id="reporter" readonly style="background: #eee; cursor: not-allowed;">
        </div>

        <button type="submit" id="submitBtn" class="btn-primary">Hantar Laporan & Gambar</button>
    </form>
    
    <div id="statusMsg"></div>

    <button class="btn-logout" onclick="location.reload()">Log Keluar Sistem</button>
</div>

<script>
    // --- KONFIGURASI ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxoace7fkEYJhqhdpRKixVzV_puFqXcyghqcI6QFgYd4HeAMmXUGK31IM8AgOtupX0tgw/exec';
    let currentRole = 'user';
    
    // Kata laluan admin statik (Boleh diubah)
    const ADMIN_PASS = "admin123";

    // --- LOGIK AUTHENTICATION ---
    function setRole(role) {
        currentRole = role;
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        
        // Sembunyikan pendaftaran jika pilih admin
        document.getElementById('signUpPrompt').style.display = (role === 'admin') ? 'none' : 'block';
        document.getElementById('idInput').placeholder = (role === 'admin') ? "Username Admin" : "ID Pelajar (e.g: F1010)";
    }

    function toggleAuth(mode) {
        document.getElementById('loginBox').style.display = (mode === 'login') ? 'block' : 'none';
        document.getElementById('signupBox').style.display = (mode === 'signup') ? 'block' : 'none';
    }

    function handleSignUp() {
        const id = document.getElementById('regId').value.trim().toUpperCase();
        const pass = document.getElementById('regPass').value;

        if(!id || !pass) return alert("Sila isi semua ruangan!");
        
        // Simpan dalam LocalStorage (Simulasi Database Pelajar)
        localStorage.setItem('user_' + id, pass);
        alert("Pendaftaran Berjaya! Sila log masuk.");
        toggleAuth('login');
    }

    function checkLogin() {
        const id = document.getElementById('idInput').value.trim().toUpperCase();
        const pass = document.getElementById('passInput').value;
        const err = document.getElementById('loginErr');

        if(currentRole === 'admin') {
            if(id === "ADMIN" && pass === ADMIN_PASS) {
                proceedToApp("ADMIN");
            } else {
                err.style.display = 'block';
            }
        } else {
            // Check LocalStorage untuk pelajar
            const storedPass = localStorage.getItem('user_' + id);
            if(storedPass && storedPass === pass) {
                proceedToApp(id);
            } else {
                err.style.display = 'block';
            }
        }
    }

    function proceedToApp(userId) {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('reporter').value = userId;
    }

    // --- LOGIK BORANG (KEKALKAN FEATURES ASAL) ---
    const form = document.getElementById('ticketForm');
    const btn = document.getElementById('submitBtn');
    const statusMsg = document.getElementById('statusMsg');
    let base64String = "";

    function previewImage() {
        const file = document.getElementById('fileInput').files[0];
        const reader = new FileReader();
        const preview = document.getElementById('preview');

        reader.onload = function(e) {
            const img = new Image();
            img.src = e.target.result;
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const maxWidth = 500; 
                const scale = maxWidth / img.width;
                canvas.width = maxWidth;
                canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                base64String = canvas.toDataURL('image/jpeg', 0.8);
                preview.src = base64String;
                preview.style.display = "block";
            }
        };
        if (file) { reader.readAsDataURL(file); }
    }

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerHTML = "Sedang Menghantar...";

        const formData = {
            alat: document.getElementById('toolType').value,
            serial: document.getElementById('serialNo').value,
            priority: document.getElementById('priority').value,
            masalah: document.getElementById('desc').value,
            pelapor: document.getElementById('reporter').value,
            gambar: base64String 
        };

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(formData)
        })
        .then(() => {
            statusMsg.className = "status-msg success";
            statusMsg.innerHTML = "✅ Laporan Berjaya Dihantar!";
            statusMsg.style.display = "block";
            form.reset();
            document.getElementById('preview').style.display = "none";
            base64String = "";
            btn.disabled = false;
            btn.innerHTML = "Hantar Laporan & Gambar";
            window.scrollTo({top: 0, behavior: 'smooth'});
        })
        .catch(error => {
            alert("Ralat: " + error.message);
            btn.disabled = false;
        });
    });
</script>
</body>
</html>
