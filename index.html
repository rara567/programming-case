<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Tiket Kerosakan Alat Geomatik</title>
    <style>
        :root { --primary: #e74c3c; --secondary: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        /* Form Styling */
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--secondary); margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        label { display: block; font-weight: bold; margin: 10px 0 5px; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #c0392b; }

        /* List Styling */
        .ticket-list { max-height: 550px; overflow-y: auto; }
        .ticket-item { background: #fff; border-left: 5px solid var(--primary); padding: 15px; margin-bottom: 10px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        .ticket-header { display: flex; justify-content: space-between; font-size: 12px; color: #7f8c8d; }
        .priority-tag { padding: 2px 8px; border-radius: 10px; font-size: 10px; color: white; }
        .high { background: #e74c3c; }
        .medium { background: #f39c12; }
        .low { background: #3498db; }
        .status-badge { font-size: 11px; font-weight: bold; color: #27ae60; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<h1 style="text-align:center; color: #2c3e50;">Geomatic Equipment Ticketing System</h1>

<div class="container">
    <div class="card">
        <h2>Hantar Laporan Kerosakan</h2>
        <form id="faultForm">
            <label>Jenis Peralatan</label>
            <select id="toolType" required>
                <option value="Total Station">Total Station</option>
                <option value="GNSS Receiver">GNSS Receiver</option>
                <option value="Digital Level">Digital Level</option>
                <option value="Drone/UAV">Drone/UAV</option>
                <option value="Aksesori (Prism/Tripod)">Aksesori (Prism/Tripod)</option>
            </select>

            <label>No. Siri / No. Aset</label>
            <input type="text" id="serialNo" placeholder="Contoh: TS-2024-001" required>

            <label>Tahap Keutamaan</label>
            <select id="priority">
                <option value="high">Kritikal (Alat tidak boleh guna langsung)</option>
                <option value="medium">Sederhana (Ada ralat/rosak kecil)</option>
                <option value="low">Rutin (Perlu kalibrasi/servis)</option>
            </select>

            <label>Deskripsi Kerosakan</label>
            <textarea id="desc" rows="4" placeholder="Terangkan kerosakan secara terperinci..." required></textarea>

            <label>Nama Pelapor</label>
            <input type="text" id="reporter" placeholder="Nama anda" required>

            <button type="submit">Hantar Tiket Kerosakan</button>
        </form>
    </div>

    <div class="card">
        <h2>Senarai Tiket Aktif</h2>
        <div id="ticketContainer" class="ticket-list">
            <p style="color: #95a5a6; text-align: center;">Tiada laporan kerosakan setakat ini.</p>
        </div>
    </div>
</div>

<script>
    const faultForm = document.getElementById('faultForm');
    const ticketContainer = document.getElementById('ticketContainer');

    faultForm.addEventListener('submit', function(e) {
        e.preventDefault();

        // Ambil Data
        const tool = document.getElementById('toolType').value;
        const serial = document.getElementById('serialNo').value;
        const priority = document.getElementById('priority').value;
        const desc = document.getElementById('desc').value;
        const reporter = document.getElementById('reporter').value;
        const time = new Date().toLocaleString();

        // Cipta Elemen Tiket
        const ticket = document.createElement('div');
        ticket.className = 'ticket-item';
        
        ticket.innerHTML = `
            <div class="ticket-header">
                <span>ID: #${Math.floor(Math.random() * 1000)}</span>
                <span>${time}</span>
            </div>
            <strong style="font-size: 16px;">${tool} (${serial})</strong>
            <span class="priority-tag ${priority}">${priority.toUpperCase()}</span>
            <p style="font-size: 14px; margin: 10px 0;">${desc}</p>
            <small>Dilapor oleh: <b>${reporter}</b></small>
            <span class="status-badge">● STATUS: PENDING REVIEW</span>
        `;

        // Masukkan ke dalam senarai (paling atas)
        if (ticketContainer.innerHTML.includes("Tiada laporan")) {
            ticketContainer.innerHTML = "";
        }
        ticketContainer.prepend(ticket);

        // Reset Borang
        faultForm.reset();
        alert("Laporan telah dihantar ke stor bengkel!");
    });
</script>

</body>
</html>
