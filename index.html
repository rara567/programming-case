<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Tiket Geomatik v2.0</title>
    <style>
        :root { --primary: #2980b9; --danger: #e74c3c; --bg: #f5f6fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #34495e; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-submit { background: var(--primary); color: white; }
        .btn-submit:hover { background: #2471a3; }
        .btn-submit:disabled { background: #bdc3c7; cursor: not-allowed; }

        #statusMsg { text-align: center; margin-top: 15px; font-weight: bold; padding: 10px; border-radius: 5px; display: none; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <h2>Laporan Kerosakan Alat</h2>
    <form id="ticketForm">
        <div class="form-group">
            <label>Jenis Peralatan</label>
            <select id="toolType">
                <option value="Total Station">Total Station</option>
                <option value="GNSS Receiver">GNSS Receiver</option>
                <option value="Digital Level">Digital Level</option>
                <option value="Drone">Drone/UAV</option>
                <option value="Aksesori">Aksesori (Tripod/Prism)</option>
            </select>
        </div>

        <div class="form-group">
            <label>No. Siri / No. Aset</label>
            <input type="text" id="serialNo" placeholder="Contoh: TS-01-2024" required>
        </div>

        <div class="form-group">
            <label>Tahap Kerosakan</label>
            <select id="priority">
                <option value="High">Kritikal (Tidak boleh guna)</option>
                <option value="Medium">Sederhana (Ada ralat/rosak kecil)</option>
                <option value="Low">Rutin (Perlu servis/kalibrasi)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Deskripsi Masalah</label>
            <textarea id="desc" rows="4" placeholder="Nyatakan apa yang rosak..." required></textarea>
        </div>

        <div class="form-group">
            <label>Nama Pelapor</label>
            <input type="text" id="reporter" placeholder="Nama anda" required>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">Hantar Laporan ke Database</button>
    </form>

    <div id="statusMsg"></div>
</div>

<script>
    // URL Web App anda yang telah di-deploy
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzmLJUHO_KKdlCOR1DsX6lZ-eVLhWcz-J0kIlb2kiMYwTPzWNJOAJU7OlEyoOG_ouX5Eg/exec';
    const form = document.getElementById('ticketForm');
    const btn = document.getElementById('submitBtn');
    const statusMsg = document.getElementById('statusMsg');

    form.addEventListener('submit', e => {
        e.preventDefault();
        
        // Tukar status butang
        btn.disabled = true;
        btn.innerHTML = "Sedang Menghantar...";
        statusMsg.style.display = "none";

        // Sediakan data untuk dihantar
        const formData = {
            alat: document.getElementById('toolType').value,
            serial: document.getElementById('serialNo').value,
            priority: document.getElementById('priority').value,
            masalah: document.getElementById('desc').value,
            pelapor: document.getElementById('reporter').value
        };

        // Hantar ke Google Apps Script menggunakan Fetch
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors', // Penting untuk mengelakkan isu CORS dengan Google Script
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        })
        .then(response => {
            // Paparkan mesej berjaya
            statusMsg.className = "success";
            statusMsg.innerHTML = "Berjaya! Laporan telah disimpan dalam Google Sheets.";
            statusMsg.style.display = "block";
            
            // Reset form
            form.reset();
            btn.disabled = false;
            btn.innerHTML = "Hantar Laporan ke Database";
        })
        .catch(error => {
            statusMsg.className = "error";
            statusMsg.innerHTML = "Ralat: " + error.message;
            statusMsg.style.display = "block";
            btn.disabled = false;
            btn.innerHTML = "Cuba Lagi";
        });
    });
</script>

</body>
</html>
