<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Aduan Kerosakan Alat Geomatik PUO</title>
    <style>
        :root { 
            --primary: #2980b9; 
            --secondary: #3498db;
            --bg: #f5f6fa; 
            --text: #2c3e50;
            --admin-color: #e67e22;
        }

        /* Latar Belakang Penuh */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 40px 20px;
            background-image: url('backgroundpuo.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: var(--bg);
            color: var(--text);
        }

        /* --- SISTEM LOG MASUK STYLING --- */
        #loginOverlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .role-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            background: #f9f9f9;
            font-weight: bold;
        }

        .role-btn.active {
            border-color: var(--primary);
            background: rgba(41, 128, 185, 0.1);
            color: var(--primary);
        }

        /* --- KEKALKAN STYLING ASAL --- */
        .container { 
            max-width: 650px; 
            margin: auto; 
            background: rgba(255, 255, 255, 0.92); 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: none; /* Sembunyi sehingga login berjaya */
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            gap: 20px;
            border-bottom: 2px solid rgba(41, 128, 185, 0.1);
            padding-bottom: 20px;
        }

        .header-container img {
            width: 70px;
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .header-container h2 { 
            margin: 0;
            color: var(--primary); 
            font-size: 1.6rem;
            font-weight: 800;
            line-height: 1.2;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--text); font-size: 0.95rem; }

        input, select, textarea { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #e1e8ed; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--secondary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.15);
        }

        #preview { 
            width: 100%; 
            max-height: 250px; 
            object-fit: cover; 
            margin-top: 15px; 
            display: none; 
            border: 3px dashed var(--secondary); 
            border-radius: 15px; 
        }
        
        button { 
            width: 100%; 
            padding: 18px; 
            border: none; 
            border-radius: 12px; 
            font-size: 1.1rem; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            margin-top: 15px; 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; 
            box-shadow: 0 8px 15px rgba(41, 128, 185, 0.2);
        }
        
        button:hover { 
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        #logoutBtn {
            background: #e74c3c;
            padding: 8px 15px;
            font-size: 0.8rem;
            width: auto;
            position: absolute;
            top: 10px;
            right: 10px;
        }

        #statusMsg { 
            text-align: center; 
            margin-top: 20px; 
            font-weight: bold; 
            padding: 15px; 
            border-radius: 12px; 
            display: none; 
        }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <img src="logo.png" style="width: 60px; margin-bottom: 15px;">
        <h3>Log Masuk Sistem</h3>
        <div class="role-selector">
            <button class="role-btn active" onclick="setRole('user')">Pengguna</button>
            <button class="role-btn" onclick="setRole('admin')">Admin</button>
        </div>
        <div class="form-group">
            <input type="password" id="passInput" placeholder="Masukkan Kata Laluan">
        </div>
        <button onclick="checkLogin()">Masuk Sekarang</button>
        <p id="loginErr" style="color:red; font-size: 0.8rem; margin-top:10px; display:none;">Kata laluan salah!</p>
    </div>
</div>

<div class="container" id="mainApp">
    <button id="logoutBtn" onclick="location.reload()">Log Keluar</button>
    <div class="header-container">
        <img src="logo.png" alt="Logo PUO">
        <h2>E-Aduan Kerosakan Alat Geomatik PUO</h2>
    </div>

    <form id="ticketForm">
        <div class="form-group">
            <label>Jenis Peralatan</label>
            <select id="toolType">
                <option value="" disabled selected>Pilih Alatan...</option>
                <optgroup label="Alat Utama">
                    <option value="Total Station">Total Station</option>
                    <option value="GNSS Receiver">GNSS Receiver</option>
                    <option value="Digital Level">Digital Level</option>
                </optgroup>
                <optgroup label="Aksesori & Lain-lain">
                    <option value="Tripod">Tripod</option>
                    <option value="Prism">Prism</option>
                    <option value="Leveling Staff">Leveling Staff</option>
                    <option value="Pita Ukur">Pita Ukur</option>
                    <option value="Tukul">Tukul</option>
                    <option value="Lain-lain">Lain-lain</option>
                </optgroup>
            </select>
        </div>

        <div class="form-group">
            <label>No. Siri / No. Aset</label>
            <input type="text" id="serialNo" placeholder="Contoh: PUO/GEO/TS-01" required>
        </div>

        <div class="form-group">
            <label>Tahap Kerosakan</label>
            <select id="priority">
                <option value="High">Kritikal (Tidak Boleh Diguna)</option>
                <option value="Medium">Sederhana (Masih Berfungsi)</option>
                <option value="Low">Rutin (Kerosakan Kecil)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Deskripsi Masalah</label>
            <textarea id="desc" rows="4" placeholder="Sila jelaskan kerosakan secara terperinci..." required></textarea>
        </div>

        <div class="form-group">
            <label>Gambar Kerosakan</label>
            <input type="file" id="fileInput" accept="image/*" onchange="previewImage()">
            <img id="preview" src="" alt="Pratonton Gambar">
        </div>

        <div class="form-group">
            <label>Nama Pelapor</label>
            <input type="text" id="reporter" placeholder="Masukkan nama penuh anda" required>
        </div>

        <button type="submit" id="submitBtn">Hantar Laporan & Gambar</button>
    </form>
    <div id="statusMsg"></div>
</div>

<script>
    // --- LOGIK LOG MASUK ---
    let currentRole = 'user';
    const PASSWORDS = {
        admin: 'admin123',  // Ganti dengan pass admin anda
        user: 'user123'     // Ganti dengan pass user anda
    };

    function setRole(role) {
        currentRole = role;
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
    }

    function checkLogin() {
        const input = document.getElementById('passInput').value;
        const err = document.getElementById('loginErr');
        
        if(input === PASSWORDS[currentRole]) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        } else {
            err.style.display = 'block';
        }
    }

    // --- KOD ASAL ANDA (TIADA PERUBAHAN) ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxoace7fkEYJhqhdpRKixVzV_puFqXcyghqcI6QFgYd4HeAMmXUGK31IM8AgOtupX0tgw/exec';
    
    const form = document.getElementById('ticketForm');
    const btn = document.getElementById('submitBtn');
    const statusMsg = document.getElementById('statusMsg');
    let base64String = "";

    function previewImage() {
        const file = document.getElementById('fileInput').files[0];
        const reader = new FileReader();
        const preview = document.getElementById('preview');

        reader.onload = function(e) {
            const img = new Image();
            img.src = e.target.result;
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const maxWidth = 500; 
                const scale = maxWidth / img.width;
                canvas.width = maxWidth;
                canvas.height = img.height * scale;
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                base64String = canvas.toDataURL('image/jpeg', 0.8);
                preview.src = base64String;
                preview.style.display = "block";
            }
        };
        if (file) { reader.readAsDataURL(file); }
    }

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerHTML = "Memproses Laporan...";

        const formData = {
            alat: document.getElementById('toolType').value,
            serial: document.getElementById('serialNo').value,
            priority: document.getElementById('priority').value,
            masalah: document.getElementById('desc').value,
            pelapor: document.getElementById('reporter').value,
            gambar: base64String 
        };

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(formData)
        })
        .then(() => {
            statusMsg.className = "success";
            statusMsg.innerHTML = "✅ Laporan Berjaya Dihantar ke Bengkel Geomatik!";
            statusMsg.style.display = "block";
            form.reset();
            document.getElementById('preview').style.display = "none";
            base64String = "";
            btn.disabled = false;
            btn.innerHTML = "Hantar Laporan & Gambar";
            window.scrollTo({top: 0, behavior: 'smooth'});
        })
        .catch(error => {
            alert("Ralat Teknikal: " + error.message);
            btn.disabled = false;
            btn.innerHTML = "Cuba Lagi";
        });
    });
</script>
</body>
</html>
